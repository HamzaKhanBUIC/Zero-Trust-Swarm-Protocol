name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25.x'

    - name: Build IDP Daemon
      run: go build -v ./cmd/idp-daemon

    - name: Build Registry
      run: go build -v ./cmd/registry

    - name: Build Agent
      run: go build -v ./cmd/agent

    - name: Run Unit Tests
      run: go test -v -race ./...
